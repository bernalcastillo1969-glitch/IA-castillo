<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Castillo | Asistente Inteligente</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Google Sans', sans-serif;
            background-color: #131314;
            color: #e3e3e3;
        }
        
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        /* Gradient especial de Gemini para el saludo */
        .gradient-text {
            background: linear-gradient(74deg, #4285f4 0, #9b72cb 9%, #d96570 20%, #d96570 24%, #9b72cb 35%, #4285f4 44%, #9b72cb 50%, #d96570 56%, #131314 75%, #131314 100%);
            background-size: 400% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Animación de carga tipo Google */
        .loader-dot {
            width: 6px; height: 6px; border-radius: 50%; background: #a8c7fa;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot1 { animation-delay: -0.32s; }
        .dot2 { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar (Barra Izquierda) -->
    <aside class="w-[68px] hidden md:flex flex-col items-center py-4 border-r border-gray-800 bg-[#1e1f20] shrink-0">
        <button class="text-gray-400 hover:text-white mb-8 text-xl"><i class="fa-solid fa-bars"></i></button>
        <button id="new-chat-btn" class="text-gray-400 hover:text-white bg-[#131314] p-3 rounded-full mb-auto transition-colors" title="Nuevo chat">
            <i class="fa-solid fa-plus"></i>
        </button>
        <button class="text-gray-400 hover:text-white mt-auto text-xl"><i class="fa-solid fa-gear"></i></button>
    </aside>

    <!-- Contenido Principal -->
    <main class="flex-1 flex flex-col relative h-full w-full">
        
        <!-- Navbar Superior (Móvil) -->
        <header class="md:hidden flex items-center justify-between p-4 px-5 text-gray-200 bg-[#131314] z-10">
            <button class="text-xl"><i class="fa-solid fa-bars"></i></button>
            <span class="font-medium text-lg">IA Castillo</span>
            <button id="new-chat-mobile" class="text-xl"><i class="fa-solid fa-square-plus"></i></button>
        </header>

        <!-- Navbar Superior (Escritorio) -->
        <header class="hidden md:flex items-center p-4 pl-6 text-xl font-medium text-gray-200 relative z-10">
            IA Castillo <span class="text-[10px] ml-2 font-bold bg-[#1e1f20] border border-gray-700 text-blue-400 px-2 py-1 rounded-md"><i class="fa-solid fa-bolt"></i> Plus</span>
        </header>

        <!-- Contenedor del Chat (Scrollable) -->
        <div id="chat-container" class="flex-1 overflow-y-auto chat-scroll flex flex-col px-4 md:px-0 scroll-smooth pb-40">
            
            <!-- Estado Vacío Inicial (Saludo grande) -->
            <div id="empty-state" class="w-full flex-1 flex flex-col items-center justify-center mt-6 md:-mt-10 transition-opacity duration-300">
                
                <!-- Textos principales tipo Gemini -->
                <div class="w-full max-w-[800px] text-left md:pl-8 mb-8">
                    <h1 class="text-[44px] md:text-[56px] font-medium leading-[1.1] mb-2 gradient-text inline-block">✨ Hola, Bernal</h1>
                    <h2 class="text-[44px] md:text-[56px] font-medium leading-[1.1] text-[#444746]">¿Por dónde empezamos?</h2>
                </div>

                <!-- Botones de sugerencia (Tus 4 Modos IA) -->
                <div class="flex flex-wrap justify-center gap-3 mt-4 max-w-[800px] px-2 w-full">
                    <button class="mode-btn bg-[#1e1f20] hover:bg-[#333537] text-[14px] font-medium text-gray-300 px-5 py-3 rounded-full transition-colors flex items-center gap-2 border border-transparent" data-modo="matematicas">
                        📐 Tutor de Matemáticas
                    </button>
                    <button class="mode-btn bg-[#1e1f20] hover:bg-[#333537] text-[14px] font-medium text-gray-300 px-5 py-3 rounded-full transition-colors flex items-center gap-2 border border-transparent" data-modo="legal">
                        ⚖️ Legal Venezuela
                    </button>
                    <button class="mode-btn bg-[#1e1f20] hover:bg-[#333537] text-[14px] font-medium text-gray-300 px-5 py-3 rounded-full transition-colors flex items-center gap-2 border border-transparent" data-modo="chef">
                        👨‍🍳 Chef de Recetas
                    </button>
                    <button class="mode-btn bg-[#1e1f20] hover:bg-[#333537] text-[14px] font-medium text-gray-300 px-5 py-3 rounded-full transition-colors flex items-center gap-2 border border-transparent" data-modo="psicologo">
                        🧠 Apoyo Emocional
                    </button>
                </div>
            </div>

            <!-- Área donde aparecerán los mensajes -->
            <div id="messages-area" class="w-full max-w-[800px] mx-auto flex-col gap-8 pt-8 hidden">
                <!-- Los mensajes se insertan aquí -->
            </div>

        </div>

        <!-- Caja de Entrada de Texto (Input) Fija abajo -->
        <div class="absolute bottom-0 w-full bg-gradient-to-t from-[#131314] via-[#131314] to-transparent pt-10 pb-6 px-4 md:px-0 flex flex-col items-center pointer-events-none">
            
            <div class="w-full max-w-[800px] relative pointer-events-auto">
                <div class="bg-[#1e1f20] rounded-[32px] flex items-center px-4 py-3 focus-within:bg-[#333537] transition-all relative">
                    
                    <!-- Botón Más -->
                    <button class="text-gray-400 hover:text-white p-2 rounded-full transition-colors flex-shrink-0">
                        <i class="fa-solid fa-plus text-[18px]"></i>
                    </button>
                    
                    <!-- Textarea -->
                    <textarea 
                        id="user-input" 
                        rows="1"
                        placeholder="Pregunta a IA Castillo" 
                        class="flex-1 bg-transparent border-none outline-none text-[#e3e3e3] px-3 resize-none max-h-32 min-h-[24px] overflow-hidden text-[15px]"
                    ></textarea>
                    
                    <!-- Indicador del modo activo (Ej. Tutor Matemáticas) -->
                    <span id="current-mode-badge" class="hidden md:flex text-[11px] text-gray-400 font-medium mr-2 whitespace-nowrap bg-[#131314] px-2 py-1 rounded-md uppercase tracking-wider">
                        Matemáticas
                    </span>

                    <!-- Botón Enviar -->
                    <button id="send-btn" class="bg-gray-100/10 text-white w-9 h-9 rounded-full flex items-center justify-center transition-all ml-1 flex-shrink-0 hover:bg-white hover:text-black">
                        <i class="fa-solid fa-arrow-up text-[14px]" id="send-icon"></i>
                        <div id="loader" class="hidden flex gap-1 items-center justify-center">
                            <div class="loader-dot dot1"></div>
                            <div class="loader-dot dot2"></div>
                            <div class="loader-dot"></div>
                        </div>
                    </button>
                </div>
                <!-- Mini disclaimer al estilo Google -->
                <p class="text-center text-[#a8c7fa]/60 text-[11px] mt-3 tracking-wide">
                    IA Castillo es un desarrollo personalizado y puede mostrar información imprecisa. Revisa las respuestas importantes.
                </p>
            </div>
        </div>

    </main>

    <script>
        let modoActual = 'matematicas';
        let isFirstMessage = true;

        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sendIcon = document.getElementById('send-icon');
        const loader = document.getElementById('loader');
        const emptyState = document.getElementById('empty-state');
        const messagesArea = document.getElementById('messages-area');
        const chatContainer = document.getElementById('chat-container');
        const modeBadge = document.getElementById('current-mode-badge');
        
        // Función para que la caja crezca según escribas
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            
            // Ilumina el botón de enviar si hay texto
            if(this.value.trim().length > 0) {
                sendBtn.classList.add('bg-white', 'text-black');
                sendBtn.classList.remove('bg-gray-100/10', 'text-white');
            } else {
                sendBtn.classList.remove('bg-white', 'text-black');
                sendBtn.classList.add('bg-gray-100/10', 'text-white');
            }
        });

        // Configuración de los modos (Botones de sugerencia)
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                modoActual = btn.dataset.modo;
                
                // Efecto visual: Resalta el botón seleccionado 
                document.querySelectorAll('.mode-btn').forEach(b => {
                    b.classList.remove('bg-blue-900/20', 'border-[#4285f4]/50', 'text-blue-100');
                    b.classList.add('bg-[#1e1f20]', 'border-transparent');
                });
                btn.classList.remove('bg-[#1e1f20]', 'border-transparent');
                btn.classList.add('bg-blue-900/20', 'border-[#4285f4]/50', 'text-blue-100');
                
                // Actualiza el texto chiquito en la barra de entrada
                modeBadge.textContent = btn.innerText.replace(/[^\w\sñáéíóúÁÉÍÓÚ]/g, '').trim();
                
                // Reinicia la memoria en el servidor al cambiar de modo
                fetch('/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ modo: modoActual })
                });

                userInput.focus();
            });
        });

        // Simula click en "Matemáticas" por defecto
        document.querySelector('.mode-btn').click();

        // Botón de (+) Nuevo Chat
        const resetChat = () => {
            messagesArea.innerHTML = '';
            messagesArea.classList.add('hidden');
            emptyState.classList.remove('hidden');
            emptyState.classList.add('flex');
            isFirstMessage = true;
            fetch('/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ modo: modoActual })
            });
        };
        document.getElementById('new-chat-btn').addEventListener('click', resetChat);
        document.getElementById('new-chat-mobile').addEventListener('click', resetChat);

        // Formato básico para negritas y saltos de línea
        function formatText(text) {
            let formatted = text.replace(/\*\*(.*?)\*\*/g, '<b class="text-white">$1</b>'); 
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }

        async function postMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Transición del "Estado Vacío" a la "Ventana de Chat"
            if (isFirstMessage) {
                emptyState.classList.remove('flex');
                emptyState.classList.add('hidden');
                messagesArea.classList.remove('hidden');
                messagesArea.classList.add('flex');
                isFirstMessage = false;
            }

            addMessageBubble(message, 'user');
            
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.classList.remove('bg-white', 'text-black');
            sendBtn.classList.add('bg-gray-100/10', 'text-white');
            
            // Estado Cargando
            sendIcon.classList.add('hidden');
            loader.classList.remove('hidden');
            sendBtn.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje: message, modo: modoActual })
                });
                const data = await response.json();
                addMessageBubble(data.respuesta, 'ai');
            } catch (err) {
                addMessageBubble('Error de conexión con IA Castillo.', 'ai');
            } finally {
                sendIcon.classList.remove('hidden');
                loader.classList.add('hidden');
                sendBtn.disabled = false;
                chatContainer.scrollTop = chatContainer.scrollHeight;
                userInput.focus();
            }
        }

        // Añade el mensaje (La UI estilo Gemini no usa burbujas de colores, es texto plano)
        function addMessageBubble(text, role) {
            const wrapper = document.createElement('div');
            wrapper.className = 'w-full flex gap-4 md:gap-6 mb-4';

            if (role === 'user') {
                wrapper.innerHTML = `
                    <div class="w-8 h-8 md:w-9 md:h-9 rounded-full bg-blue-500 flex items-center justify-center flex-shrink-0 mt-1">
                        <i class="fa-solid fa-user text-white text-xs"></i>
                    </div>
                    <div class="flex-1 text-[#e3e3e3] text-[15px] leading-relaxed pt-1.5 font-medium">
                        ${formatText(text)}
                    </div>
                `;
            } else {
                wrapper.innerHTML = `
                    <div class="w-8 h-8 md:w-9 md:h-9 rounded-full bg-gradient-to-br from-[#4285f4] to-[#9b72cb] flex items-center justify-center flex-shrink-0 mt-1">
                        <i class="fa-solid fa-sparkles text-white text-[14px]"></i>
                    </div>
                    <div class="flex-1 text-[#e3e3e3] text-[15px] leading-relaxed pt-1 flex flex-col gap-2">
                        ${formatText(text)}
                    </div>
                `;
            }

            messagesArea.appendChild(wrapper);
            
            // Auto-scroll
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 50);
        }

        sendBtn.addEventListener('click', postMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                postMessage();
            }
        });
        
        userInput.focus();
    </script>
</body>
</html>
